# install-haproxy-keepalived.yaml
# Ejemplo de alta disponibilidad: instala HAProxy y Keepalived en paralelo en el mismo grupo.
# Ambos pasos no tienen dependencias entre sí — se ejecutan al mismo tiempo.
#
# Uso: ikctl --pipeline kits/pipelines/install-haproxy-keepalived.yaml

name: install-ha-loadbalancer

steps:
  - id: packages
    kit: packages
    servers: loadbalancers
    sudo: true

  # haproxy y keepalived se instalan en paralelo (ambos dependen solo de packages)
  - id: haproxy
    kit: haproxy
    servers: loadbalancers
    sudo: true
    needs: [packages]

  - id: keepalived
    kit: keepalived
    servers: loadbalancers
    sudo: true
    needs: [packages]
