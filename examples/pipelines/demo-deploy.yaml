# demo-deploy.yaml
# Ejemplo completo que demuestra:
#   - Outputs declarados en ikctl.yaml de cada kit
#   - Output chaining entre steps ({{ steps.<id>.KEY }})
#   - Parámetros del CLI ({{ params.KEY }})
#   - Dependencias secuenciales (needs:)
#
# Requisito: copiar examples/demo/ a tu path_kits
#
# Uso:
#   ikctl --pipeline demo-deploy \
#     -p APP_VERSION=2.1.0 \
#     -p ALERT_EMAIL=ops@mycompany.com
#
# Para ver los outputs de cada kit antes de ejecutar:
#   ikctl --describe prepare-env
#   ikctl --describe deploy-service
#   ikctl --describe configure-monitoring
#
# Para un preview sin ejecutar:
#   ikctl --pipeline demo-deploy \
#     -p APP_VERSION=2.1.0 \
#     -p ALERT_EMAIL=ops@mycompany.com \
#     --dry-run

name: demo-deploy

steps:
  # Step 1: Preparar el entorno base
  # Outputs: HOSTNAME, OS_VERSION, PACKAGES_OK
  - id: prepare-env
    kit: prepare-env
    servers: workers
    sudo: true

  # Step 2: Desplegar el servicio
  # Recibe:
  #   - APP_VERSION del CLI (-p APP_VERSION=2.1.0)
  #   - HOSTNAME del step anterior ({{ steps.prepare-env.HOSTNAME }})
  # Outputs: SERVICE_PORT, SERVICE_URL, SERVICE_STATUS
  - id: deploy-service
    kit: deploy-service
    servers: workers
    sudo: true
    needs: [prepare-env]
    params:
      - "{{ params.APP_VERSION }}"           # -p APP_VERSION=2.1.0
      - "{{ steps.prepare-env.HOSTNAME }}"   # output del step anterior

  # Step 3: Configurar monitorización
  # Recibe:
  #   - SERVICE_URL del step deploy-service
  #   - SERVICE_PORT del step deploy-service
  #   - ALERT_EMAIL del CLI (-p ALERT_EMAIL=ops@mycompany.com)
  # Outputs: MONITOR_ENDPOINT, ALERT_EMAIL
  - id: configure-monitoring
    kit: configure-monitoring
    servers: workers
    sudo: true
    needs: [deploy-service]
    params:
      - "{{ steps.deploy-service.SERVICE_URL }}"   # output de deploy-service
      - "{{ steps.deploy-service.SERVICE_PORT }}"  # output de deploy-service
      - "{{ params.ALERT_EMAIL }}"                 # -p ALERT_EMAIL=ops@...
